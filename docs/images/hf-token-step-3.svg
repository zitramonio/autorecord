<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Шаг 3: выбрать Read token">
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect x="70" y="60" width="1060" height="600" rx="16" fill="#ffffff" stroke="#d7dce3"/>
  <text x="100" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#151b23">Шаг 3. Выберите тип токена</text>
  <text x="100" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#24292f">Для Autorecord нужен только доступ на чтение модели.</text>
  <rect x="100" y="210" width="1000" height="70" rx="8" fill="#fbfcfe" stroke="#d7dce3"/>
  <text x="130" y="254" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#57606a">Token name</text>
  <rect x="350" y="225" width="370" height="40" rx="6" fill="#ffffff" stroke="#cfd6df"/>
  <text x="370" y="253" font-family="Consolas, monospace" font-size="21" fill="#24292f">autorecord-pyannote</text>
  <rect x="100" y="320" width="290" height="95" rx="12" fill="#eaf3ff" stroke="#0b57d0" stroke-width="4"/>
  <text x="145" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0b57d0">Read</text>
  <text x="145" y="398" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#57606a">скачивание моделей</text>
  <rect x="455" y="320" width="290" height="95" rx="12" fill="#ffffff" stroke="#d7dce3"/>
  <text x="500" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#57606a">Write</text>
  <text x="500" y="398" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#8c959f">не нужен</text>
  <rect x="810" y="320" width="290" height="95" rx="12" fill="#ffffff" stroke="#d7dce3"/>
  <text x="855" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#57606a">Fine-grained</text>
  <text x="855" y="398" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#8c959f">можно, но сложнее</text>
  <path d="M245 430 L245 505" stroke="#0b57d0" stroke-width="6" marker-end="url(#arrow)"/>
  <text x="100" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#0b57d0">Выбирайте Read</text>
  <text x="100" y="596" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#24292f">Этого достаточно для скачивания gated-модели, если доступ уже выдан.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0b57d0"/>
    </marker>
  </defs>
</svg>
