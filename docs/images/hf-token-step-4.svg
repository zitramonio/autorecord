<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Шаг 4: скопировать токен и вставить в Autorecord">
  <rect width="1200" height="720" fill="#f6f7f9"/>
  <rect x="70" y="60" width="1060" height="600" rx="16" fill="#ffffff" stroke="#d7dce3"/>
  <text x="100" y="115" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#151b23">Шаг 4. Скопируйте токен и вставьте в Autorecord</text>
  <rect x="100" y="170" width="1000" height="96" rx="10" fill="#fbfcfe" stroke="#d7dce3"/>
  <text x="130" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#57606a">Hugging Face покажет токен:</text>
  <rect x="430" y="190" width="430" height="46" rx="7" fill="#f1f3f5" stroke="#cfd6df"/>
  <text x="455" y="221" font-family="Consolas, monospace" font-size="23" fill="#24292f">hf_xxxxxxxxxxxxxxxxx</text>
  <rect x="885" y="190" width="145" height="46" rx="8" fill="#111827"/>
  <text x="923" y="221" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Copy</text>
  <path d="M960 255 L960 330" stroke="#0b57d0" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="100" y="350" width="1000" height="210" rx="10" fill="#f7fbff" stroke="#8ab6f9"/>
  <text x="130" y="396" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#0b57d0">Autorecord</text>
  <text x="130" y="438" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#24292f">Транскрибация → Разделение по спикерам → Спикеры — Pyannote Community-1</text>
  <rect x="130" y="470" width="150" height="46" rx="7" fill="#e6eefc" stroke="#8ab6f9"/>
  <text x="170" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#0b57d0">Скачать</text>
  <text x="310" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="23" fill="#24292f">Вставьте токен в окно скачивания модели.</text>
  <text x="100" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#d1242f">Не отправляйте токен в чат и не публикуйте его.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0b57d0"/>
    </marker>
  </defs>
</svg>
